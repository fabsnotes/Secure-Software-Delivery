name: Secure Delivery Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  security-events: write
  actions: read

concurrency:
  group: secure-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  secret_scan:
    name: Tahap 1 - Secret Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run Gitleaks
        run: |
          docker run --rm \
            -v "$PWD:/repo" \
            zricethezav/gitleaks:latest \
            detect --source /repo \
            --report-format json \
            --report-path /repo/gitleaks-report.json \
            --exit-code 1
      - name: Upload Gitleaks report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-report
          path: gitleaks-report.json
          if-no-files-found: ignore

  sast:
    name: Tahap 2 - SAST
    runs-on: ubuntu-latest
    needs: secret_scan
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
      - name: Run Semgrep SAST
        run: |
          docker run --rm \
            -v "$PWD:/src" \
            semgrep/semgrep:latest \
            semgrep scan \
            --config p/owasp-top-ten \
            --severity ERROR \
            --error \
            /src

  build_test:
    name: Tahap 3 - Build and Unit Test
    runs-on: ubuntu-latest
    needs: sast
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
      - name: Build and run unit test
        run: mvn clean test

  dependency_scan:
    name: Tahap 4 - Dependency Scan
    runs-on: ubuntu-latest
    needs: build_test
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
      - name: Run OWASP Dependency-Check
        run: |
          mvn org.owasp:dependency-check-maven:check \
            -DfailBuildOnCVSS=7 \
            -Dformat=HTML \
            -Dformat=JSON
